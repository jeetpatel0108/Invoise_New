<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Invoice System</title>
    <style>
        :root {
            --bg: #f3f7f6;
            --card: #ffffff;
            --primary: #1f7a43;
            --primary-dark: #175c32;
            --blue: #2563eb;
            --blue-dark: #1d4ed8;
            --text: #1d2b32;
            --muted: #607079;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(180deg, #f7fbfa 0%, var(--bg) 100%);
            display: grid;
            place-items: center;
            padding: 20px;
            color: var(--text);
        }
        .card {
            width: 100%;
            max-width: 560px;
            background: var(--card);
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(20, 56, 41, 0.12);
            padding: 36px;
            text-align: center;
        }
        h1 {
            margin: 0 0 10px;
            color: var(--primary);
        }
        p {
            margin: 0 0 24px;
            color: var(--muted);
        }
        .actions {
            display: grid;
            gap: 12px;
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            color: #fff;
            padding: 12px 16px;
            border-radius: 10px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-login {
            background: var(--primary);
        }
        .btn-login:hover {
            background: var(--primary-dark);
        }
        .btn-register {
            background: var(--blue);
        }
        .btn-register:hover {
            background: var(--blue-dark);
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Shree Gopal Traders</h1>
        <p>Please login or register to continue.</p>
        <div class="actions">
            <a class="btn btn-login" href="/login">Login</a>
            <a class="btn btn-register" href="/register">Register</a>
        </div>
    </main>
</body>
</html>
